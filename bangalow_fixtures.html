const FIELD_ORDER=['Bang3','Bang4','Bang5','Bang6','Bang7','Bang8','Bang9','Bang10','JSF','Bang2'];

function cleanComp(c){return c.replace(/ (Burgess|McGree|Foord|Irvine|Wheeler|Arnold|Carpenter|Raso|Kerr|Metcalfe|Bos)/g,'');}

function teamDisplayName(teamStr,comp){
  if(/Men's|Women's/i.test(comp))return comp;
  const compClean=cleanComp(comp);
  const isGirlsComp=/^Girls/i.test(compClean);
  const ageMatch=compClean.match(/Age\s+[\d\/]+(?:\s+(?:Div\.\s*\d+(?:\s+\w+)?|SAP))?/i);
  const agePart=ageMatch?ageMatch[0]:compClean;
  const girlsPart=isGirlsComp?'Girls · ':'';
  const stripped=teamStr.replace(/^Bangalow\s*/i,'').trim();
  return `${agePart} · ${girlsPart}${stripped||'–'}`;
}

function timeToMin(t){const[hm,ap]=t.split(' ');let[h,m]=hm.split(':').map(Number);if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+m;}

function getDate(dateStr){const mo={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};const p=dateStr.replace(/^(Sat|Sun) /,'').split('-');return new Date(2026,mo[p[1]],parseInt(p[0]));}

function weekFriday(d){const day=d.getDay();const fri=new Date(d);fri.setDate(d.getDate()-(day>=5?day-5:day+2));return fri.toISOString().slice(0,10);}

function fmtWeek(friStr){const fri=new Date(friStr+'T00:00:00');const thu=new Date(fri);thu.setDate(fri.getDate()+6);const f=d=>d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});return`${f(fri)} – ${f(thu)}`;}

function fieldCls(f){const m={Bang3:'f-b3',Bang4:'f-b4',Bang5:'f-b5',Bang6:'f-b6',Bang7:'f-b7',Bang8:'f-b8',Bang9:'f-b9',Bang10:'f-b10',JSF:'f-jsf',Bang2:'f-b2'};return m[f]||'';}

const weekMap={},weeks=[];
RAW.forEach(r=>{const d=getDate(r.date);const wk=weekFriday(d);if(!weekMap[wk]){weekMap[wk]=[];weeks.push(wk);}weekMap[wk].push({...r,dateObj:d});});
weeks.sort();

const sel=document.getElementById('week-select');
weeks.forEach(w=>{const o=document.createElement('option');o.value=w;o.textContent=fmtWeek(w);sel.appendChild(o);});

function renderSchedule(){
  const wk=sel.value;const rows=weekMap[wk]||[];
  const byDay={};rows.forEach(r=>{if(!byDay[r.date])byDay[r.date]=[];byDay[r.date].push(r);});
  const out=document.getElementById('schedule-out');out.innerHTML='';
  const dayOrder=Object.keys(byDay).sort((a,b)=>getDate(a)-getDate(b));
  dayOrder.forEach(day=>{
    const dayRows=byDay[day];
    const usedFields=[...new Set(dayRows.map(r=>r.field).filter(f=>f))].sort((a,b)=>FIELD_ORDER.indexOf(a)-FIELD_ORDER.indexOf(b));
    const usedTimes=[...new Set(dayRows.map(r=>r.time))].sort((a,b)=>timeToMin(a)-timeToMin(b));
    const cellMap={};dayRows.forEach(r=>{if(!r.field)return;const k=r.field+'|'+r.time;if(!cellMap[k])cellMap[k]=[];cellMap[k].push(r);});
    const noField=dayRows.filter(r=>!r.field);
    const lbl=document.createElement('div');lbl.className='day-label';
    lbl.textContent=`${day.startsWith('Sat')?'Saturday':'Sunday'} ${day.replace(/^(Sat|Sun) /,'').replace('-',' ')}`;
    out.appendChild(lbl);
    const wrap=document.createElement('div');wrap.className='section-wrap';
    const table=document.createElement('table');table.className='grid-table';
    const thead=document.createElement('thead');
    const hr=document.createElement('tr');
    hr.innerHTML=`<th class="field-col">Field</th>`+usedTimes.map(t=>`<th>${t}</th>`).join('');
    thead.appendChild(hr);table.appendChild(thead);
    const tbody=document.createElement('tbody');
    usedFields.forEach(field=>{
      const tr=document.createElement('tr');
      const fc=document.createElement('td');fc.className='field-cell';
      fc.innerHTML=`<span class="field-badge ${fieldCls(field)}">${field}</span>`;
      tr.appendChild(fc);
      usedTimes.forEach(time=>{
        const td=document.createElement('td');
        const items=cellMap[field+'|'+time]||[];
        td.innerHTML=items.map(r=>`<div class="cell-item"><div class="cell-comp">${cleanComp(r.comp)}</div><div class="cell-home">${r.home}</div><div class="cell-vs">v</div><div class="cell-visit">${r.visit}</div></div>`).join('');
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);wrap.appendChild(table);out.appendChild(wrap);
    if(noField.length){
      const note=document.createElement('div');note.className='no-field-note';
      note.innerHTML='<strong>No field assigned:</strong> '+noField.map(r=>`${cleanComp(r.comp)} — ${r.home} v ${r.visit} (${r.time})`).join(' · ');
      out.appendChild(note);
    }
  });
}

renderSchedule();

function getAllBangalowTeams(){
  const map={};
  RAW.forEach(r=>{[r.home,r.visit].forEach(t=>{if(t.toLowerCase().includes('bangalow')){const comp=cleanComp(r.comp);const key=t+'||'+comp;if(!map[key])map[key]={team:t,comp,display:teamDisplayName(t,comp)};}});});
  return Object.values(map).sort((a,b)=>a.display.localeCompare(b.display));
}

const allTeams=getAllBangalowTeams();
const teamSelWrap=document.getElementById('team-selects');
for(let i=0;i<4;i++){
  const wrap=document.createElement('div');wrap.className='compare-select-wrap';
  wrap.innerHTML=`<label>Team ${i+1}</label>`;
  const s=document.createElement('select');s.id=`ts-${i}`;s.onchange=renderCompare;
  s.innerHTML=`<option value="">— select —</option>`;
  allTeams.forEach(t=>{const o=document.createElement('option');o.value=JSON.stringify({team:t.team,comp:t.comp,display:t.display});o.textContent=t.display;s.appendChild(o);});
  wrap.appendChild(s);teamSelWrap.appendChild(wrap);
}

function renderCompare(){
  const selected=Array.from({length:4},(_,i)=>{const v=document.getElementById(`ts-${i}`).value;return v?JSON.parse(v):null;});
  const thead=document.getElementById('compare-head');const tbody=document.getElementById('compare-body');
  thead.innerHTML='';tbody.innerHTML='';
  const hr=document.createElement('tr');
  hr.innerHTML=`<th style="width:110px">Week</th>`+selected.map((s,i)=>`<th>${s?s.display:`Team ${i+1}`}</th>`).join('');
  thead.appendChild(hr);
  weeks.forEach(wk=>{
    const wkRows=weekMap[wk]||[];
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="week-cell">${fmtWeek(wk)}</td>`;
    selected.forEach(s=>{
      const td=document.createElement('td');
      if(!s){td.innerHTML=`<span class="away-cell">—</span>`;tr.appendChild(td);return;}
      const matches=wkRows.filter(r=>cleanComp(r.comp)===s.comp&&(r.home===s.team||r.visit===s.team));
      if(!matches.length){td.innerHTML=`<span class="away-cell">AWAY</span>`;}
      else{td.innerHTML=matches.map(r=>{const isH=r.home===s.team;const opp=isH?r.visit:r.home;return`<div class="fixture-card"><div class="opp">${opp}</div><div class="meta">${r.time}${r.field?' &middot; '+r.field:''}<span class="${isH?'home-tag':'away-tag'}">${isH?'H':'A'}</span></div></div>`;}).join('');}
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

renderCompare();

function showTab(t){
  document.getElementById('tab-schedule').style.display=t==='schedule'?'':'none';
  document.getElementById('tab-compare').style.display=t==='compare'?'':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='schedule')||(i===1&&t==='compare')));
}
